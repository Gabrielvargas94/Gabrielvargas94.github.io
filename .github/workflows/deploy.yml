name: Build, test, and deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Reads version from package.json `packageManager` field.

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint CSS
        run: pnpm run lint:css

      - name: Lint JS
        run: pnpm run lint:js

      - name: Build site + all artifacts
        run: pnpm run build
        env:
          PUBLIC_UMAMI_ID: ${{ secrets.UMAMI_WEBSITE_ID }}

      - name: A11y tests
        run: pnpm run test:a11y

      - name: SEO tests
        run: pnpm run test:seo

      - name: Artifacts tests
        run: pnpm run test:artifacts

      - name: i18n tests
        run: pnpm run test:i18n

      - name: Lighthouse CI
        run: pnpm run test:lhci
        continue-on-error: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    # IndexNow push is best-effort; never block CI on it.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Ping IndexNow (Bing + Yandex + DuckDuckGo + Naver + Seznam)
        run: node scripts/ping-indexnow.mjs
